services:
  postgres:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-autopoly}
      POSTGRES_USER: ${POSTGRES_USER:-autopoly}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in stack env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-autopoly} -d ${POSTGRES_DB:-autopoly}"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 15s

  redis:
    image: redis:8-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 10s

  orchestrator:
    build:
      context: .
      dockerfile: services/orchestrator/Dockerfile.hostinger
    restart: unless-stopped
    init: true
    env_file:
      - ${STACK_ENV_FILE:-./deploy/hostinger/stack.env}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["sh", "-lc", "pnpm vendor:sync && pnpm --filter @autopoly/orchestrator start"]
    ports:
      - "127.0.0.1:4001:4001"
    volumes:
      - runtime_artifacts:/app/runtime-artifacts
      - vendor_repos:/app/vendor/repos
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:4001/health >/dev/null"]
      interval: 20s
      timeout: 5s
      retries: 10
      start_period: 30s

  executor:
    build:
      context: .
      dockerfile: services/executor/Dockerfile.hostinger
    restart: unless-stopped
    init: true
    env_file:
      - ${STACK_ENV_FILE:-./deploy/hostinger/stack.env}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      orchestrator:
        condition: service_healthy
    ports:
      - "127.0.0.1:4002:4002"
    volumes:
      - runtime_artifacts:/app/runtime-artifacts
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:4002/health >/dev/null"]
      interval: 20s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  postgres_data:
  redis_data:
  runtime_artifacts:
  vendor_repos:
