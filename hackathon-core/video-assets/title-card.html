<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hourglass - Title Card</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0f0f23;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    font-family: 'Kreon', serif;
  }
  .container { text-align: center; }
  .title {
    color: #d4a574;
    font-size: 80px;
    font-weight: 700;
    letter-spacing: 6px;
  }
  .subtitle {
    color: #e8e8e8;
    font-size: 28px;
    margin-top: 20px;
    font-weight: 400;
    font-family: 'Noto Sans SC', sans-serif;
  }
  .badge {
    color: #f4a261;
    font-size: 18px;
    margin-top: 40px;
    letter-spacing: 4px;
    text-transform: uppercase;
  }
  .divider {
    width: 120px;
    height: 2px;
    background: linear-gradient(90deg, transparent, #d4a574, transparent);
    margin: 30px auto 0;
  }
</style>
<link href="https://fonts.googleapis.com/css2?family=Kreon:wght@700&family=Noto+Sans+SC:wght@400&display=swap" rel="stylesheet">
</head>
<body>
<div class="container">
  <div class="title">&#x23F3; HOURGLASS</div>
  <div class="subtitle">链上信号驱动的预测市场交易 Agent</div>
  <div class="divider"></div>
  <div class="badge">AVE CLAW HACKATHON 2026</div>
</div>
</body>
</html>
